spring.application.name=student
# DataSource configuration for PostgreSQL
# Supports Render/Heroku style env vars and local split vars
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:${DATABASE_JDBC_URL:jdbc:postgresql://${DB_HOST:${PGHOST:${POSTGRES_HOST:${RENDER_POSTGRES_HOST:localhost}}}}:${DB_PORT:${PGPORT:${POSTGRES_PORT:${RENDER_POSTGRES_PORT:5432}}}}/${DB_NAME:${PGDATABASE:${POSTGRES_DB:${RENDER_POSTGRES_DB:db_song}}}}?sslmode=${DB_SSLMODE:${PGSSLMODE:${POSTGRES_SSLMODE:disable}}}}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:${DB_USERNAME:${DB_USER:${PGUSER:${POSTGRES_USER:${RENDER_POSTGRES_USER:postgres}}}}}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:${DB_PASSWORD:${PGPASSWORD:${POSTGRES_PASSWORD:${RENDER_POSTGRES_PASSWORD:admin}}}}}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA/Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect fallback: avoids 'Unable to determine Dialect without JDBC metadata' when metadata can't be read
# (note: you still need a working DB connection)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ---- Server ----
# Render provides PORT; default to 8080 for local
server.port=${PORT:8080}

# ---- HikariCP ----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000