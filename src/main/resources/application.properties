spring.application.name=student
# DataSource configuration for PostgreSQL
# Supports Render/Heroku style env vars and local split vars
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:${DATABASE_JDBC_URL:jdbc:postgresql://${DB_HOST:${PGHOST:localhost}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:db_song}}?sslmode=${DB_SSLMODE:disable}}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:${DB_USERNAME:${DB_USER:${PGUSER:postgres}}}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:${DB_PASSWORD:${PGPASSWORD:admin}}}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA/Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect fallback: avoids 'Unable to determine Dialect without JDBC metadata' when metadata can't be read
# (note: you still need a working DB connection)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ---- Server ----
# Render provides PORT; default to 8080 for local
server.port=${PORT:8080}

# ---- HikariCP ----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000